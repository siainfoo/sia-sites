<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIA | GTA5 Editor</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* ФОН */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(-45deg, #0a0a0a, #1b1b1b, #000000, #111111);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  z-index: -2;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ВОДЯНОЙ ЗНАК */
.watermark {
  position: absolute;
  font-size: 140px;
  opacity: 0.03;
  font-weight: bold;
  z-index: -1;
}

/* НИК */
h1 {
  font-size: 65px;
  letter-spacing: 6px;
  text-shadow:
    0 0 5px #ff00ff,
    0 0 15px #ff00ff,
    0 0 30px #00ffff;
}

/* АВАТАРКА */
.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  margin-top: 15px;
  border: 3px solid #ff00ff;
  box-shadow:
    0 0 10px #ff00ff,
    0 0 25px #00ffff;
  transition: 0.3s;
}

.avatar:hover {
  transform: scale(1.05);
  box-shadow:
    0 0 20px #ff00ff,
    0 0 45px #00ffff;
}

/* ТЕКСТ */
.subtitle {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.85;
}

/* СЕРВЕР */
.server {
  margin-top: 10px;
  font-size: 15px;
  color: #00ffcc;
  letter-spacing: 2px;
}

/* ПРОМОКОД */
.promo {
  margin-top: 10px;
  font-size: 18px;
  letter-spacing: 2px;
}

.promo span {
  color: #ffcc00;
  text-shadow: 0 0 10px #ffcc00;
  font-weight: bold;
}

/* КНОПКИ */
.links {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

a {
  text-decoration: none;
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.3s;
  border: 1px solid transparent;
}

.tiktok {
  color: #ff0050;
  border-color: #ff0050;
}

.youtube {
  color: red;
  border-color: red;
}

.telegram {
  color: #00bfff;
  border-color: #00bfff;
}

a:hover {
  transform: scale(1.06);
  box-shadow: 0 0 15px currentColor;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="watermark">SIA</div>

<div>

  <h1>SIA</h1>

  <!-- АВАТАРКА (ЛОКАЛЬНАЯ) -->
  <img class="avatar" src="avatar.png" alt="avatar">

  <div class="subtitle">
    GTA5 Editor • Montage Creator • Highlight Maker
  </div>

  <div class="server">
    Ukraine GTA5 Promo Server | SIA Edition
  </div>

  <div class="promo">
    PROMOCODE: <span>SIA</span>
  </div>

  <div class="subtitle">
    Привет 👋 Я SIA — делаю стильные эдиты GTA5
  </div>

  <div class="links">
    <a class="tiktok" href=https://www.tiktok.com/@disappointttedd?_r=1&_t=ZS-9605gxPnDsb" target="_blank">TikTok</a>
    <a class="youtube" href=https://youtube.com/@disappointtted?si=2Cxd8JR9tRhpl4WB" target="_blank">YouTube</a>
    <a class="telegram" href=https://t.me/siabiooo" target="_blank">Telegram</a>
  </div>

</div>

</body>
</html>
